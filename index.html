<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <header>
        <h1 id="titleHeader">Welcome to Helpdesk</h1>
    </header>
    <main>
        <div id="login">

            <div class="inputdiv">
                <label for="role">Role</label>
                <input type="text" name="role" id="role" class="input" placeholder="Enter role">
            </div>
            <div class="inputdiv">
                <label for="password">Password</label>
                <input type="password" name="password" id="password" class="input" placeholder="Enter password">
            </div>
            <button onclick="getRolePassword()">Log in</button>
        </div>
    </main>
    <footer>
        <h1 id="titleFooter">Please Log in for further actions</h1>
    </footer>
    <script src="/js/loginHandler.js"></script>
</body>

</html>
